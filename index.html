<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Školské obvody MŠ — Zobor, Nitra</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Georgia', 'Times New Roman', serif;
    background: #f5f1e8;
    color: #1d1d1d;
  }
  header {
    padding: 14px 16px 10px;
    border-bottom: 2px solid #1d1d1d;
  }
  h1 { margin: 0 0 4px 0; font-size: 18px; }
  .sub { font-size: 12px; opacity: 0.7; margin: 0; }
  
  #map {
    width: 100%;
    height: 60vh;
    background: #ddd;
    border-bottom: 2px solid #1d1d1d;
  }
  @media (min-width: 900px) {
    .layout { display: flex; height: calc(100vh - 70px); }
    #map { height: 100%; flex: 2; border-bottom: none; border-right: 2px solid #1d1d1d; }
    .panel { flex: 1; height: 100%; overflow-y: auto; }
  }
  
  .panel { padding: 14px 16px; background: #fff; }
  .status {
    padding: 10px 12px;
    background: #fffbe6;
    border: 1px solid #e0d4a0;
    border-radius: 4px;
    font-size: 13px;
    margin-bottom: 12px;
  }
  .status.done { background: #e6f4ea; border-color: #66a366; }
  .status.error { background: #ffe0e0; border-color: #c33; color: #800; }
  
  .legend { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .legend-item {
    display: flex; align-items: center; gap: 10px;
    cursor: pointer; padding: 10px 12px;
    border-radius: 6px;
    background: #f8f5ec;
    transition: background 0.15s;
  }
  .legend-item:active { background: #ebe5d0; }
  .legend-item.off { opacity: 0.35; }
  .swatch {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid #1d1d1d;
    flex-shrink: 0;
  }
  .legend-label { font-size: 13px; font-weight: bold; line-height: 1.3; }
  .legend-count { font-size: 11px; opacity: 0.6; margin-left: auto; }
  
  details { border-top: 1px solid #ddd; padding: 8px 0; }
  summary { cursor: pointer; font-weight: bold; font-size: 13px; padding: 4px 0; }
  .street-list {
    font-size: 12px; columns: 2; column-gap: 14px;
    margin-top: 8px; line-height: 1.6;
  }
  .street-list span { display: block; break-inside: avoid; }
  .street-list span.found::before { content: "● "; color: #2a9d8f; }
  .street-list span.notfound::before { content: "○ "; color: #c33; }
  .street-list span.pending::before { content: "· "; color: #aaa; }
  
  .leaflet-popup-content { font-family: Georgia, serif; }
  progress { width: 100%; height: 8px; }
</style>
</head>
<body>

<header>
  <h1>Školské obvody MŠ — Zobor, Nitra</h1>
  <p class="sub">Klikni na legendu na vypnutie/zapnutie obvodu.</p>
</header>

<div class="layout">
  <div id="map"></div>
  <aside class="panel">
    <div class="status" id="status">Inicializujem mapu…</div>
    <div class="legend" id="legend"></div>
    <div id="details"></div>
    <p style="font-size:11px;opacity:0.6;margin-top:16px;">
      Dáta: OpenStreetMap (Overpass API).<br>
      Hornozoborská a Jelenecká sú rozdelené podľa čísel domov — na mape je vyznačená vždy len príslušná časť ulice.
    </p>
  </aside>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const obvody = [
  { name: "MŠ Dobšinského 2885/8", color: "#e63946",
    streets: ["Astrová","Azalková","Bojnická","Buková","Burgundská","Černicová","Dobšinského","Dolnohorská","Drozdí chodník","Dubová","Fialková","Gaštanová","Gladiolová","Hornohorská","Hornozoborská","Hospodárska","Chatárska","Jahodová","Jelenecká","Kamenná","Kláštorská","Klinčeková","Ľaliová","Levanduľová","Malá kamenná","Malá podhájska","Malinová","Margarétková","Narcisová","Nécseyho","Nevädzová","Panská dolina","Pivonková","Pod lesom","Pod Lupkou","Podhájska","Poniklecová","Prvosienková","Ratkošova","Rekreačná","Slávičie chodníky","Snežienková","Šafranová","Tŕnistá","Turistická","Úzka","Veltlínska","Vendelínska","Viničná","Vyhliadková","Vysoká","Záhradkárska","Zvončeková"] },
  { name: "MŠ Vansovej 6", color: "#2a9d8f",
    streets: ["Bartókova","Havrania","Hlohová","Hraničná","Hornozoborská","Jaseňová","Jastrabia","Jelenecká","Kodályova","Krivánska","Kyjevská","Martinská dolina","Metodova","Moskovská","Orlia","Poľovnícka","Radová","Ríbezľová","Rosinského","Sirôtková","Sojčia","Sokolia","Tatarkova","Tolstého","Vansovej","Višňová","Vrania","Žibrická"] },
  { name: "MŠ Platanová 3", color: "#f4a261",
    streets: ["Bažantia","Brestová","Broskyňová","Dolnozoborská","Dražovská","Hroznová","Chmeľová dolina","Jánskeho","Jazerná","Kľúčovského","Komenského","Malá strmá","Mandľová","Morušová","Muškátová","Nad baňou","Oravská","Orechová","Orgovánová","Oskorušová","Platanová","Pod Zlatým brehom","Podhorská","Pri jazierku","Rovná","Ružová","Silvánska","Skautská","Strmá","Studená","Sv. Beňadika","Svätoplukova","Svätourbanská","Tabaková","Tichá","Urbancova","Veterinárska","Vinohradnícka"] },
  { name: "MŠ Belopotockého 2", color: "#6a4c93",
    streets: ["Ambrova","Atlasova","Belopotockého","Cez panské","Dobrotka","Dolné Hony","Hamuljakova","Holubyho","Horeckého","Horná","Horné lúky","Hrabová","Jána Zelenáka","Kanálová","Kochova","Kultúrna","Lidická","Lukáčova","Lužianska","Mrázova","Na gruntoch","Na pasienkoch","Pekná","Pod kostolíkom","Pod Plieškou","Pri Dobrotke","Pri Jelšine","Pri Perinovej studni","Pri škole","Rozmarínová","Ščasného","Severná","Smreková","Šulekova","Švabinského","Topoľčianska","Vŕbová","Zoborská"] }
];

// Ulice rozdelené medzi obvody podľa čísel domov
// splitHouseOdd: hraničné nepárne číslo (Dobšinského ≤ toto, Vansovej > toto)
const PARTIAL_STREETS = {
  'Hornozoborská': {
    splitHouseOdd: 137,
    lowObvod: 'MŠ Dobšinského 2885/8', lowLabel: 'po č. 137 nepárne, po č. 82 párne',
    highObvod: 'MŠ Vansovej 6',        highLabel: 'č. 141–167 nepárne, od č. 84 párne'
  },
  'Jelenecká': {
    splitHouseOdd: 29,
    lowObvod: 'MŠ Dobšinského 2885/8', lowLabel: 'č. 1–29 nepárne, všetky párne',
    highObvod: 'MŠ Vansovej 6',        highLabel: 'od č. 31 nepárne'
  }
};

const statusEl = document.getElementById('status');

// Inicializácia mapy
const map = L.map('map').setView([48.3370, 18.1050], 14);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap',
  maxZoom: 19
}).addTo(map);

setTimeout(() => map.invalidateSize(), 100);
setTimeout(() => map.invalidateSize(), 500);
window.addEventListener('resize', () => map.invalidateSize());
window.addEventListener('orientationchange', () => setTimeout(() => map.invalidateSize(), 300));

const layerGroups = {};
obvody.forEach(o => { layerGroups[o.name] = L.layerGroup().addTo(map); });

// Legenda
const legendEl = document.getElementById('legend');
obvody.forEach((o, idx) => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `
    <div class="swatch" style="background:${o.color}"></div>
    <div class="legend-label">${o.name}</div>
    <div class="legend-count" id="cnt-${idx}">0/${o.streets.length}</div>`;
  item.addEventListener('click', () => {
    item.classList.toggle('off');
    if (map.hasLayer(layerGroups[o.name])) map.removeLayer(layerGroups[o.name]);
    else map.addLayer(layerGroups[o.name]);
  });
  legendEl.appendChild(item);
});

// Zoznam ulíc v paneli
const detailsEl = document.getElementById('details');
obvody.forEach((o, i) => {
  const det = document.createElement('details');
  det.innerHTML = `
    <summary style="color:${o.color}">▸ ${o.name} (${o.streets.length})</summary>
    <div class="street-list" id="list-${i}">
      ${o.streets.map(s => `<span class="pending" data-street="${s}" data-idx="${i}">${s}</span>`).join('')}
    </div>`;
  detailsEl.appendChild(det);
});

// Cache: undefined = nikdy nehľadané, null = nenájdené, array = nájdené (Overpass geometria)
// Prefix v2 invaliduje starý Nominatim cache
const CACHE_PFX = 'zobor2_';
function cacheGet(key) {
  try {
    const raw = localStorage.getItem(CACHE_PFX + key);
    if (raw === null) return undefined;
    return JSON.parse(raw);
  } catch { return undefined; }
}
function cacheSet(key, val) {
  try { localStorage.setItem(CACHE_PFX + key, JSON.stringify(val)); } catch {}
}

const allBounds = [];
let totalDone = 0, totalFound = 0;
const totalStreets = obvody.reduce((a,o) => a + o.streets.length, 0);

function escapeRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

// ---- Geometrické pomocníky pre rozdelené ulice ----

// Najbližší bod na úseku AB ku bodu p; vracia t∈[0,1] a d² v °²
function nearestOnSeg(p, a, b) {
  const dx = b.lon - a.lon, dy = b.lat - a.lat, len2 = dx*dx + dy*dy;
  if (len2 < 1e-20) return { t: 0, d2: (p.lon-a.lon)**2 + (p.lat-a.lat)**2 };
  const t = Math.max(0, Math.min(1, ((p.lon-a.lon)*dx + (p.lat-a.lat)*dy) / len2));
  return { t, d2: (p.lon - a.lon - t*dx)**2 + (p.lat - a.lat - t*dy)**2 };
}

// Zlúči way-segmenty (polia {lat,lon}) do súvislých reťazcov spájaním spoločných krajných bodov
function mergeWaySegments(ways) {
  const eps2 = 1e-10;
  const chains = ways.map(w => [...w]);
  let changed = true;
  while (changed) {
    changed = false;
    outer: for (let i = 0; i < chains.length; i++) {
      for (let j = i + 1; j < chains.length; j++) {
        const A = chains[i], B = chains[j];
        const sq = (a, b) => (a.lat-b.lat)**2 + (a.lon-b.lon)**2;
        const aE = A[A.length-1], bE = B[B.length-1];
        if      (sq(aE,   B[0]) < eps2) { chains[i] = [...A, ...B.slice(1)];                    chains.splice(j,1); changed=true; break outer; }
        else if (sq(aE,   bE)   < eps2) { chains[i] = [...A, ...[...B].reverse().slice(1)];     chains.splice(j,1); changed=true; break outer; }
        else if (sq(A[0], bE)   < eps2) { chains[i] = [...B, ...A.slice(1)];                    chains.splice(j,1); changed=true; break outer; }
        else if (sq(A[0], B[0]) < eps2) { chains[i] = [...[...B].reverse(), ...A.slice(1)];     chains.splice(j,1); changed=true; break outer; }
      }
    }
  }
  return chains;
}

// Rozdeľ reťazec na dve časti v bode najbližšom k splitNode
function splitChain(chain, splitNode) {
  let bestSeg = 0, bestT = 0, bestD2 = Infinity;
  for (let i = 0; i < chain.length - 1; i++) {
    const { t, d2 } = nearestOnSeg(splitNode, chain[i], chain[i+1]);
    if (d2 < bestD2) { bestD2 = d2; bestSeg = i; bestT = t; }
  }
  const sp = {
    lat: chain[bestSeg].lat + bestT * (chain[bestSeg+1].lat - chain[bestSeg].lat),
    lon: chain[bestSeg].lon + bestT * (chain[bestSeg+1].lon - chain[bestSeg].lon)
  };
  return {
    before: [...chain.slice(0, bestSeg + 1), sp],
    after:  [sp, ...chain.slice(bestSeg + 1)]
  };
}

// Pre rozdelenú ulicu: zlúč ways, urči orientáciu podľa čísel domov, rozdeľ na low/high
function computePartialSplit(streetName, wayGeoms, addrNodes) {
  const cfg = PARTIAL_STREETS[streetName];

  // Nájdi uzol s hraničným číslom (alebo ±2 susedné)
  const byNum = {};
  for (const n of addrNodes) {
    const h = parseInt(n.tags?.['addr:housenumber']);
    if (!isNaN(h)) byNum[h] = n;
  }
  const splitNode = byNum[cfg.splitHouseOdd] ?? byNum[cfg.splitHouseOdd + 2] ?? byNum[cfg.splitHouseOdd - 2];

  if (!splitNode) {
    console.warn(`Nenašiel sa deliaci bod pre ${streetName} (č. ${cfg.splitHouseOdd})`);
    return { low: wayGeoms, high: [] };
  }

  const chains = mergeWaySegments(wayGeoms);

  // Urči orientáciu: uzol s najnižším číslom domu má byť na začiatku reťazca
  const nums = Object.keys(byNum).map(Number).sort((a, b) => a - b);
  const lowestNode = byNum[nums[0]];
  if (lowestNode) {
    for (const chain of chains) {
      const dFirst = (chain[0].lat - lowestNode.lat)**2 + (chain[0].lon - lowestNode.lon)**2;
      const dLast  = (chain[chain.length-1].lat - lowestNode.lat)**2 + (chain[chain.length-1].lon - lowestNode.lon)**2;
      if (dLast < dFirst) chain.reverse();
    }
  }

  const low = [], high = [];
  for (const chain of chains) {
    const { before, after } = splitChain(chain, splitNode);
    if (before.length >= 2) low.push(before);
    if (after.length >= 2) high.push(after);
  }
  return { low, high };
}

// ---- Overpass API ----

async function fetchOverpass(streetNames) {
  const pattern = streetNames.map(escapeRegex).join('|');
  const query = `[out:json][timeout:90][bbox:48.28,18.02,48.40,18.20];
way["highway"]["name"~"^(${pattern})$"];
out geom;`;
  const resp = await fetch('https://overpass-api.de/api/interpreter', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: 'data=' + encodeURIComponent(query)
  });
  if (!resp.ok) throw new Error(`Overpass ${resp.status}`);
  return resp.json();
}

// Pre rozdelené ulice: stiahni aj čísla domov (addr nodes)
async function fetchOverpassPartial(streetNames) {
  const wayClauses  = streetNames.map(n => `way["highway"]["name"="${n}"];`).join('\n');
  const addrClauses = streetNames.map(n => `node["addr:street"="${n}"]["addr:housenumber"];`).join('\n');
  const query = `[out:json][timeout:90][bbox:48.28,18.02,48.40,18.20];
(\n${wayClauses}\n${addrClauses}\n);
out geom;`;
  const resp = await fetch('https://overpass-api.de/api/interpreter', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: 'data=' + encodeURIComponent(query)
  });
  if (!resp.ok) throw new Error(`Overpass ${resp.status}`);
  return resp.json();
}

function drawWays(wayGeometries, streetName, obvod, sublabel) {
  const popup = sublabel
    ? `<b>${streetName}</b><br>${obvod.name}<br><small>${sublabel}</small>`
    : `<b>${streetName}</b><br>${obvod.name}`;
  for (const geom of wayGeometries) {
    const coords = geom.map(pt => [pt.lat, pt.lon]);
    allBounds.push(coords[0], coords[coords.length - 1]);
    L.polyline(coords, { color: obvod.color, weight: 5, opacity: 0.85 })
      .bindPopup(popup).addTo(layerGroups[obvod.name]);
  }
}

async function processAll() {
  const PARTIAL_NAMES = new Set(Object.keys(PARTIAL_STREETS));

  // 1. Rozdelené ulice — ways + čísla domov v jednom requeste
  const uncachedPartial = Object.keys(PARTIAL_STREETS).filter(n =>
    cacheGet(n + '|low') === undefined || cacheGet(n + '|high') === undefined
  );
  if (uncachedPartial.length > 0) {
    statusEl.innerHTML = 'Sťahujem dáta pre rozdelené ulice…';
    try {
      const data = await fetchOverpassPartial(uncachedPartial);
      for (const streetName of uncachedPartial) {
        const wayGeoms = [], addrNodes = [];
        for (const el of data.elements) {
          if (el.type === 'way'  && el.tags?.name === streetName && el.geometry)
            wayGeoms.push(el.geometry);
          if (el.type === 'node' && el.tags?.['addr:street'] === streetName)
            addrNodes.push(el);
        }
        const { low, high } = computePartialSplit(streetName, wayGeoms, addrNodes);
        cacheSet(streetName + '|low',  low.length  > 0 ? low  : null);
        cacheSet(streetName + '|high', high.length > 0 ? high : null);
      }
    } catch (e) {
      console.error('Overpass chyba (rozdelené ulice):', e);
      statusEl.className = 'status error';
      statusEl.innerHTML = '<b>Chyba pri načítaní dát.</b> Skús obnoviť stránku.';
      return;
    }
  }

  // 2. Bežné ulice — v dávkach po 60
  const uniqueRegular = [...new Set(obvody.flatMap(o => o.streets).filter(s => !PARTIAL_NAMES.has(s)))];
  const uncachedRegular = uniqueRegular.filter(n => cacheGet(n) === undefined);
  if (uncachedRegular.length > 0) {
    const BATCH = 60;
    const batches = Math.ceil(uncachedRegular.length / BATCH);
    for (let b = 0; b < uncachedRegular.length; b += BATCH) {
      const batch = uncachedRegular.slice(b, b + BATCH);
      statusEl.innerHTML = batches > 1
        ? `Sťahujem dáta… dávka ${Math.floor(b/BATCH)+1}/${batches}`
        : `Sťahujem dáta pre ${uncachedRegular.length} ulíc z OpenStreetMap…`;
      try {
        const data = await fetchOverpass(batch);
        const byName = {};
        for (const el of data.elements) {
          const n = el.tags?.name;
          if (!n || !el.geometry) continue;
          if (!byName[n]) byName[n] = [];
          byName[n].push(el.geometry);
        }
        for (const name of batch) cacheSet(name, byName[name] ?? null);
      } catch (e) {
        console.error('Overpass chyba:', e);
        statusEl.className = 'status error';
        statusEl.innerHTML = '<b>Chyba pri načítaní dát.</b> Skús obnoviť stránku.';
        return;
      }
    }
  }

  // 3. Vykresli všetko z cache
  statusEl.innerHTML = 'Vykresľujem mapu…';
  for (let i = 0; i < obvody.length; i++) {
    const obvod = obvody[i];
    for (const street of obvod.streets) {
      const listSpan = document.querySelector(`span[data-street="${street}"][data-idx="${i}"]`);
      let ways, sublabel;
      if (PARTIAL_NAMES.has(street)) {
        const cfg = PARTIAL_STREETS[street];
        const isLow = obvod.name === cfg.lowObvod;
        ways = cacheGet(street + (isLow ? '|low' : '|high'));
        sublabel = isLow ? cfg.lowLabel : cfg.highLabel;
      } else {
        ways = cacheGet(street);
      }
      if (ways && ways.length > 0) {
        totalFound++;
        if (listSpan) listSpan.className = 'found';
        drawWays(ways, street, obvod, sublabel);
        const cnt = document.getElementById(`cnt-${i}`);
        cnt.textContent = `${document.querySelectorAll(`#list-${i} span.found`).length}/${obvod.streets.length}`;
      } else {
        if (listSpan) listSpan.className = 'notfound';
      }
      totalDone++;
    }
  }

  statusEl.className = 'status done';
  statusEl.innerHTML = `<b>Hotovo.</b> Zobrazených ${totalFound} z ${totalStreets} ulíc.` +
    (totalFound < totalStreets ? ' Nenájdené ulice sú označené prázdnym krúžkom.' : '');
  map.invalidateSize();
  if (allBounds.length > 0) map.fitBounds(allBounds, { padding: [20, 20] });
}

processAll();
</script>

</body>
</html>
